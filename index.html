<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高雄郵局商品展示中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="bg-green-700 text-white shadow-lg sticky top-0 z-50">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <span class="text-xl font-bold">高雄郵局商品展示</span>
            <div class="text-xs opacity-80">資料來源：庫存透視機即時連動</div>
        </div>
    </nav>

    <header class="bg-white border-b py-10 text-center">
        <h1 class="text-3xl font-bold mb-2">高雄支局熱銷推展品</h1>
        <p class="text-gray-500 text-sm mb-6">點擊「庫存查詢」查看哪些支局還有現貨</p>
        <div class="max-w-md mx-auto px-4">
            <input type="text" id="searchInput" placeholder="輸入商品名稱搜尋..." 
                   class="w-full px-4 py-2 rounded-full border border-gray-300 focus:ring-2 focus:ring-green-500 outline-none">
        </div>
    </header>

    <div id="loading" class="py-20 text-center text-gray-400">正在連線資料庫...</div>

    <main class="container mx-auto px-4 py-8">
        <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
    </main>

    <!-- 彈窗 -->
    <div id="stockModal" class="fixed inset-0 bg-black/60 hidden items-center justify-center z-[100] p-4">
        <div class="bg-white rounded-2xl max-w-sm w-full overflow-hidden shadow-2xl">
            <div class="p-5 border-b flex justify-between items-center">
                <h3 class="font-bold text-lg" id="modalTitle">支局庫存詳情</h3>
                <button onclick="closeModal()" class="text-gray-400">✕</button>
            </div>
            <div class="p-5 max-h-80 overflow-y-auto" id="modalContent"></div>
            <div class="p-4 bg-gray-50 text-center">
                <button onclick="closeModal()" class="text-sm font-bold text-green-700">我知道了</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "請換成你重新部署後的_GAS_網址"; 
        let products = [];

        async function loadData() {
            try {
                const res = await fetch(API_URL);
                products = await res.json();
                document.getElementById('loading').style.display = 'none';
                render(products);
            } catch (e) {
                document.getElementById('loading').innerText = "連線失敗，請確認 GAS 權限。";
            }
        }

        function render(data) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.map((p, i) => `
                <div class="product-card bg-white rounded-xl shadow-sm border overflow-hidden flex flex-col">
                    <div class="h-40 bg-gray-100 flex items-center justify-center text-gray-300">
                        <span class="text-xs">[ 暫無商品圖片 ]</span>
                    </div>
                    <div class="p-4 flex-1">
                        <div class="flex justify-between text-[10px] mb-1">
                            <span class="text-green-600 font-bold">${p.category}</span>
                            <span class="${p.status === 'sold_out' ? 'text-red-500' : 'text-blue-500'} font-bold">
                                ${p.status === 'sold_out' ? '已完售' : '尚有庫存'}
                            </span>
                        </div>
                        <h2 class="font-bold text-gray-900 mb-1 h-12 overflow-hidden">${p.name}</h2>
                        <p class="text-red-600 font-bold text-lg mb-4">$${p.price}</p>
                        <button onclick="showDetail(${i})" class="w-full py-2 bg-green-50 text-green-700 rounded-lg text-sm font-bold border border-green-200 hover:bg-green-600 hover:text-white transition">
                            庫存查詢 (${p.totalStock})
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function showDetail(index) {
            const p = products[index];
            document.getElementById('modalTitle').innerText = p.name;
            const content = p.branches.map(b => `
                <div class="flex justify-between py-2 border-b text-sm">
                    <span class="text-gray-600">局號 ${b.branch}</span>
                    <span class="font-bold text-green-600">${b.stock} 件</span>
                </div>
            `).join('') || '<p class="text-center text-gray-400 py-4">目前無任何支局有庫存</p>';
            
            document.getElementById('modalContent').innerHTML = content;
            document.getElementById('stockModal').classList.remove('hidden');
            document.getElementById('stockModal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('stockModal').classList.add('hidden');
            document.getElementById('stockModal').classList.remove('flex');
        }

        document.getElementById('searchInput').addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            render(products.filter(p => p.name.includes(val)));
        });

        loadData();
    </script>
</body>
</html>
