<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>高雄郵局商品展示中心 | 搶先看熱銷商品與即時庫存</title>
    <meta name="description" content="高雄郵局最新推展品展示，包含集郵精品、生活好物及限定商品。提供即時庫存透視功能，讓您精準掌握各支局貨況，不用白跑一趟。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ===== CSS 變數系統 ===== */
        :root {
            --color-primary:     #1a4d2e;
            --color-primary-mid: #2d7a4f;
            --color-primary-light:#e8f5ee;
            --color-accent:      #c8a850;
            --color-accent-light:#fdf6e3;
            --color-danger:      #c0392b;
            --color-warn:        #e67e22;
            --color-surface:     #ffffff;
            --color-bg:          #f4f1ec;
            --color-text:        #1c1c1c;
            --color-muted:       #6b7280;
            --color-border:      #e2ddd6;
            --radius-card:       16px;
            --shadow-card:       0 2px 12px rgba(26,77,46,0.08);
            --shadow-hover:      0 8px 32px rgba(26,77,46,0.16);
            --font-display:      'Noto Serif TC', serif;
            --font-body:         'Noto Sans TC', sans-serif;
            --transition-smooth: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ===== Reset & Base ===== */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: var(--font-body);
            background-color: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
        }
        img { display: block; max-width: 100%; }
        button { cursor: pointer; border: none; background: none; font-family: inherit; }
        a { text-decoration: none; color: inherit; }

        /* ===== 導覽列 ===== */
        .navbar {
            background: var(--color-primary);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 3px solid var(--color-accent);
        }
        .navbar__inner {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 24px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .navbar__brand {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #fff;
        }
        .navbar__logo {
            width: 36px;
            height: 36px;
            background: var(--color-accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }
        .navbar__title {
            font-family: var(--font-display);
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .navbar__links {
            display: flex;
            gap: 24px;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.75);
        }
        .navbar__links a:hover { color: var(--color-accent); transition: var(--transition-smooth); }

        /* ===== Hero ===== */
        .hero {
            background: var(--color-primary);
            padding: 64px 24px 0;
            position: relative;
            overflow: hidden;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 40px;
            background: var(--color-bg);
            border-radius: 40px 40px 0 0;
        }
        .hero__inner {
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            padding-bottom: 60px;
            position: relative;
            z-index: 1;
        }
        .hero__badge {
            display: inline-block;
            background: var(--color-accent);
            color: var(--color-primary);
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            padding: 4px 14px;
            border-radius: 20px;
            margin-bottom: 18px;
            text-transform: uppercase;
        }
        .hero__title {
            font-family: var(--font-display);
            font-size: clamp(1.8rem, 4vw, 2.8rem);
            font-weight: 700;
            color: #fff;
            line-height: 1.3;
            margin-bottom: 16px;
        }
        .hero__title span { color: var(--color-accent); }
        .hero__desc {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.65);
            max-width: 560px;
            margin: 0 auto 36px;
        }

        /* ===== 搜尋列 ===== */
        .search-bar {
            display: flex;
            gap: 8px;
            max-width: 620px;
            margin: 0 auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        .search-bar__input {
            flex: 1;
            min-width: 220px;
            padding: 12px 18px;
            border: 2px solid rgba(255,255,255,0.15);
            border-radius: 10px;
            background: rgba(255,255,255,0.12);
            color: #fff;
            font-family: var(--font-body);
            font-size: 0.9rem;
            outline: none;
            transition: var(--transition-smooth);
        }
        .search-bar__input::placeholder { color: rgba(255,255,255,0.45); }
        .search-bar__input:focus {
            border-color: var(--color-accent);
            background: rgba(255,255,255,0.18);
        }
        .filter-btn {
            padding: 10px 18px;
            border-radius: 10px;
            font-size: 0.82rem;
            font-weight: 600;
            letter-spacing: 0.03em;
            transition: var(--transition-smooth);
            border: 2px solid transparent;
        }
        .filter-btn--default {
            background: rgba(255,255,255,0.12);
            color: rgba(255,255,255,0.8);
            border-color: rgba(255,255,255,0.15);
        }
        .filter-btn--default:hover { background: rgba(255,255,255,0.22); }
        .filter-btn--active {
            background: var(--color-accent);
            color: var(--color-primary);
            border-color: var(--color-accent);
        }

        /* ===== 主內容區 ===== */
        .main {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }
        .main__header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 28px;
        }
        .main__count-label {
            font-size: 0.82rem;
            color: var(--color-muted);
        }
        .main__count { font-weight: 700; color: var(--color-primary-mid); }

        /* ===== 商品格線 ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }

        /* ===== 商品卡片 ===== */
        .card {
            background: var(--color-surface);
            border-radius: var(--radius-card);
            border: 1px solid var(--color-border);
            box-shadow: var(--shadow-card);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
        }
        .card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-hover);
        }
        .card__img-wrap {
            position: relative;
            height: 200px;
            background: var(--color-primary-light);
            overflow: hidden;
        }
        .card__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        .card:hover .card__img { transform: scale(1.06); }
        .card__badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 0.05em;
        }
        .badge--in_stock  { background: #d1fae5; color: #065f46; }
        .badge--low_stock { background: #fef3c7; color: #92400e; }
        .badge--sold_out  { background: #fee2e2; color: #991b1b; }

        .card__body {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        .card__category {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--color-primary-mid);
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 6px;
        }
        .card__name {
            font-family: var(--font-display);
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: 8px;
            line-height: 1.4;
        }
        .card__price {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--color-primary);
            margin-bottom: 16px;
        }
        .card__price span { font-size: 0.85rem; font-weight: 400; color: var(--color-muted); }

        .card__action {
            margin-top: auto;
        }
        .btn-stock {
            width: 100%;
            padding: 11px;
            border-radius: 10px;
            font-size: 0.87rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            transition: var(--transition-smooth);
        }
        .btn-stock--active {
            background: var(--color-primary-light);
            color: var(--color-primary);
            border: 1.5px solid #b2dfc5;
        }
        .btn-stock--active:hover {
            background: var(--color-primary);
            color: #fff;
            border-color: var(--color-primary);
        }
        .btn-stock--disabled {
            background: #f3f4f6;
            color: #9ca3af;
            border: 1.5px solid #e5e7eb;
            cursor: not-allowed;
        }

        /* ===== 空狀態 ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 64px 24px;
            color: var(--color-muted);
        }
        .empty-state__icon { font-size: 3rem; margin-bottom: 12px; }
        .empty-state__text { font-size: 1rem; }

        /* ===== Modal ===== */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            backdrop-filter: blur(4px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 24px;
        }
        .modal-backdrop.is-open { display: flex; }

        .modal {
            background: var(--color-surface);
            border-radius: 20px;
            max-width: 480px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0,0,0,0.25);
            animation: slideUp 0.25s ease;
        }
        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .modal__header {
            padding: 22px 24px 18px;
            border-bottom: 1px solid var(--color-border);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            background: var(--color-primary-light);
        }
        .modal__title-group { flex: 1; }
        .modal__subtitle { font-size: 0.72rem; color: var(--color-primary-mid); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 4px; }
        .modal__title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; color: var(--color-primary); }
        .modal__close {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(0,0,0,0.08);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 1rem;
            color: var(--color-text);
            transition: var(--transition-smooth);
        }
        .modal__close:hover { background: var(--color-danger); color: #fff; }

        .modal__body {
            padding: 20px 24px;
            max-height: 55vh;
            overflow-y: auto;
        }
        .modal__notice {
            font-size: 0.78rem;
            color: var(--color-muted);
            background: var(--color-accent-light);
            border-left: 3px solid var(--color-accent);
            padding: 8px 12px;
            border-radius: 4px;
            margin-bottom: 16px;
        }
        .branch-list { display: flex; flex-direction: column; gap: 10px; }
        .branch-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 16px;
            background: #fafafa;
            border: 1px solid var(--color-border);
            border-radius: 12px;
            transition: var(--transition-smooth);
        }
        .branch-item:hover { border-color: var(--color-primary-mid); background: var(--color-primary-light); }
        .branch-item__name { font-weight: 700; font-size: 0.95rem; margin-bottom: 3px; }
        .branch-item__tel { font-size: 0.78rem; color: var(--color-muted); }
        .branch-item__stock { text-align: right; }
        .branch-item__qty {
            font-size: 1.05rem;
            font-weight: 700;
        }
        .branch-item__qty--low  { color: var(--color-danger); }
        .branch-item__qty--ok   { color: var(--color-primary-mid); }
        .branch-item__updated { font-size: 0.7rem; color: #aaa; margin-top: 2px; }

        .modal__footer {
            padding: 14px 24px;
            background: #fafafa;
            border-top: 1px solid var(--color-border);
            display: flex;
            justify-content: flex-end;
        }
        .btn-close-modal {
            padding: 9px 24px;
            border-radius: 8px;
            background: var(--color-primary);
            color: #fff;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition-smooth);
        }
        .btn-close-modal:hover { background: var(--color-primary-mid); }

        /* ===== 頁尾 ===== */
        .footer {
            background: var(--color-primary);
            color: rgba(255,255,255,0.55);
            padding: 48px 24px;
            text-align: center;
        }
        .footer__brand { font-family: var(--font-display); color: #fff; font-size: 1rem; margin-bottom: 16px; }
        .footer__links { display: flex; justify-content: center; gap: 20px; font-size: 0.82rem; margin-bottom: 24px; }
        .footer__links a:hover { color: var(--color-accent); transition: var(--transition-smooth); }
        .footer__copy { font-size: 0.75rem; }

        /* ===== 載入動畫 ===== */
        .card { animation: fadeIn 0.4s ease both; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== RWD ===== */
        @media (max-width: 480px) {
            .navbar__links { display: none; }
            .hero { padding: 40px 16px 0; }
            .search-bar__input { min-width: 100%; }
        }
    </style>
</head>
<body>

<!-- ===== 導覽列 ===== -->
<nav class="navbar">
    <div class="navbar__inner">
        <div class="navbar__brand">
            <div class="navbar__logo">📮</div>
            <span class="navbar__title">高雄郵局商品展示</span>
        </div>
        <nav class="navbar__links">
            <a href="#">首頁</a>
            <a href="#">最新公告</a>
            <a href="#">庫存透視機</a>
        </nav>
    </div>
</nav>

<!-- ===== Hero ===== -->
<header class="hero">
    <div class="hero__inner">
        <div class="hero__badge">✦ 高雄郵局特選商品</div>
        <h1 class="hero__title">
            探索高雄郵局<br><span>精選特色好物</span>
        </h1>
        <p class="hero__desc">
            透過「庫存透視」功能，直接查看哪間支局還有現貨，讓選購更透明、不白跑一趟。
        </p>
        <div class="search-bar">
            <input type="text" id="searchInput" class="search-bar__input" placeholder="搜尋商品名稱…" aria-label="搜尋商品">
            <button class="filter-btn filter-btn--active"  data-cat="all"  onclick="setFilter('all', this)">全部</button>
            <button class="filter-btn filter-btn--default" data-cat="集郵" onclick="setFilter('集郵', this)">集郵品</button>
            <button class="filter-btn filter-btn--default" data-cat="生活" onclick="setFilter('生活', this)">生活用品</button>
        </div>
    </div>
</header>

<!-- ===== 商品列表 ===== -->
<main class="main">
    <div class="main__header">
        <span class="main__count-label">共 <span class="main__count" id="productCount">0</span> 件商品</span>
    </div>
    <div id="productGrid" class="product-grid" role="list" aria-label="商品列表">
        <!-- 動態產生 -->
    </div>
</main>

<!-- ===== 庫存 Modal ===== -->
<div id="stockModal" class="modal-backdrop" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal">
        <div class="modal__header">
            <div class="modal__title-group">
                <div class="modal__subtitle">庫存透視結果</div>
                <div class="modal__title" id="modalTitle">商品名稱</div>
            </div>
            <button class="modal__close" onclick="UI.closeModal()" aria-label="關閉">✕</button>
        </div>
        <div class="modal__body">
            <div class="modal__notice">⚠ 資料僅供參考，前往前建議先致電確認。</div>
            <ul id="stockList" class="branch-list" aria-label="支局庫存列表"></ul>
        </div>
        <div class="modal__footer">
            <button class="btn-close-modal" onclick="UI.closeModal()">關閉</button>
        </div>
    </div>
</div>

<!-- ===== 頁尾 ===== -->
<footer class="footer">
    <div class="footer__brand">中華郵政 高雄郵局 — 數位展示平台</div>
    <div class="footer__links">
        <a href="#">隱私權政策</a>
        <a href="#">聯絡我們</a>
        <a href="#">庫存管理後台</a>
    </div>
    <div class="footer__copy">© 2024 Kaohsiung Post. Designed for Excellence.</div>
</footer>

<script>
/* =====================================================
   資料層 (Data Layer)
   未來可替換為 fetch('/api/products') 或 Google Apps Script
===================================================== */
const STATUS = { IN_STOCK: 'in_stock', LOW_STOCK: 'low_stock', SOLD_OUT: 'sold_out' };

const PRODUCTS = [
    {
        id: 1,
        name: "鋼鐵人 限量郵摺",
        category: "集郵",
        price: 450,
        status: STATUS.IN_STOCK,
        img: "https://images.unsplash.com/photo-1594819047050-99defca82545?w=400&q=80",
        branches: [
            { name: "新興郵局", stock: 12, tel: "07-231xxxx" },
            { name: "左營郵局", stock: 3,  tel: "07-581xxxx" },
            { name: "鳳山郵局", stock: 25, tel: "07-746xxxx" },
        ]
    },
    {
        id: 2,
        name: "SNOOPY 聯名手提袋",
        category: "生活",
        price: 299,
        status: STATUS.LOW_STOCK,
        img: "https://images.unsplash.com/photo-1544816155-12df9643f363?w=400&q=80",
        branches: [
            { name: "鼓山郵局", stock: 1, tel: "07-531xxxx" },
            { name: "三民郵局", stock: 2, tel: "07-311xxxx" },
        ]
    },
    {
        id: 3,
        name: "波波鴿 絨毛娃娃",
        category: "生活",
        price: 150,
        status: STATUS.SOLD_OUT,
        img: "https://images.unsplash.com/photo-1559440666-37421326444e?w=400&q=80",
        branches: []
    },
    {
        id: 4,
        name: "高雄風景經典明信片組",
        category: "集郵",
        price: 120,
        status: STATUS.IN_STOCK,
        img: "https://images.unsplash.com/photo-1579541814924-49fef17c5be5?w=400&q=80",
        branches: [
            { name: "旗津郵局", stock: 50, tel: "07-571xxxx" },
            { name: "美濃郵局", stock: 30, tel: "07-681xxxx" },
        ]
    }
];

/* =====================================================
   設定層 (Config)
===================================================== */
const CONFIG = {
    lowStockThreshold: 5,
    updatedLabel: "更新於 10 分鐘前",
    statusLabel: {
        [STATUS.IN_STOCK]:  "在售中",
        [STATUS.LOW_STOCK]: "即將完售",
        [STATUS.SOLD_OUT]:  "已完售",
    },
    statusClass: {
        [STATUS.IN_STOCK]:  "badge--in_stock",
        [STATUS.LOW_STOCK]: "badge--low_stock",
        [STATUS.SOLD_OUT]:  "badge--sold_out",
    }
};

/* =====================================================
   樣板層 (Templates)
===================================================== */
const Templates = {
    card(product) {
        const isSoldOut  = product.status === STATUS.SOLD_OUT;
        const badgeClass = CONFIG.statusClass[product.status];
        const badgeLabel = CONFIG.statusLabel[product.status];
        const btnClass   = isSoldOut ? 'btn-stock--disabled' : 'btn-stock--active';
        const btnLabel   = isSoldOut ? '全數售罄' : '庫存透視';
        const price      = product.price.toLocaleString('zh-TW');
        const delay      = Math.random() * 0.2;

        return `
            <li class="card" role="listitem" style="animation-delay:${delay}s">
                <div class="card__img-wrap">
                    <img class="card__img" src="${product.img}" alt="${product.name}" loading="lazy">
                    <span class="card__badge ${badgeClass}">${badgeLabel}</span>
                </div>
                <div class="card__body">
                    <p class="card__category">${product.category}</p>
                    <h2 class="card__name">${product.name}</h2>
                    <p class="card__price">NT$ ${price} <span>/ 件</span></p>
                    <div class="card__action">
                        <button class="btn-stock ${btnClass}"
                                ${isSoldOut ? 'disabled aria-disabled="true"' : `onclick="UI.openModal(${product.id})"`}
                                aria-label="${isSoldOut ? '已售罄' : `查看${product.name}庫存`}">
                            🔍 ${btnLabel}
                        </button>
                    </div>
                </div>
            </li>`;
    },

    branchItem(branch) {
        const isLow  = branch.stock < CONFIG.lowStockThreshold;
        const qtyClass = isLow ? 'branch-item__qty--low' : 'branch-item__qty--ok';
        return `
            <li class="branch-item">
                <div>
                    <div class="branch-item__name">${branch.name}</div>
                    <div class="branch-item__tel">📞 ${branch.tel}</div>
                </div>
                <div class="branch-item__stock">
                    <div class="branch-item__qty ${qtyClass}">${branch.stock} 件</div>
                    <div class="branch-item__updated">${CONFIG.updatedLabel}</div>
                </div>
            </li>`;
    },

    empty() {
        return `<li class="empty-state">
            <div class="empty-state__icon">🔍</div>
            <div class="empty-state__text">找不到符合條件的商品</div>
        </li>`;
    }
};

/* =====================================================
   狀態層 (App State)
===================================================== */
const State = {
    filter:  'all',
    query:   '',

    getFiltered() {
        return PRODUCTS.filter(p => {
            const matchCat   = this.filter === 'all' || p.category === this.filter;
            const matchQuery = p.name.toLowerCase().includes(this.query.toLowerCase());
            return matchCat && matchQuery;
        });
    }
};

/* =====================================================
   UI 控制層 (UI Controller)
===================================================== */
const UI = {
    grid:   document.getElementById('productGrid'),
    count:  document.getElementById('productCount'),
    modal:  document.getElementById('stockModal'),
    mTitle: document.getElementById('modalTitle'),
    mList:  document.getElementById('stockList'),

    render() {
        const data = State.getFiltered();
        this.count.textContent = data.length;
        this.grid.innerHTML = data.length
            ? data.map(p => Templates.card(p)).join('')
            : Templates.empty();
    },

    openModal(id) {
        const product = PRODUCTS.find(p => p.id === id);
        if (!product || product.status === STATUS.SOLD_OUT) return;

        this.mTitle.textContent = product.name;
        this.mList.innerHTML = product.branches.length
            ? product.branches.map(b => Templates.branchItem(b)).join('')
            : '<li style="text-align:center;padding:24px;color:var(--color-muted)">查無支局庫存資訊</li>';

        this.modal.classList.add('is-open');
        document.body.style.overflow = 'hidden';
    },

    closeModal() {
        this.modal.classList.remove('is-open');
        document.body.style.overflow = '';
    }
};

/* =====================================================
   事件綁定 (Event Binding)
===================================================== */
function setFilter(cat, btn) {
    State.filter = cat;
    document.querySelectorAll('.filter-btn').forEach(b => {
        b.classList.toggle('filter-btn--active', b === btn);
        b.classList.toggle('filter-btn--default', b !== btn);
    });
    UI.render();
}

document.getElementById('searchInput').addEventListener('input', e => {
    State.query = e.target.value;
    UI.render();
});

// 點擊背景關閉 Modal
document.getElementById('stockModal').addEventListener('click', e => {
    if (e.target === document.getElementById('stockModal')) UI.closeModal();
});

// ESC 關閉 Modal
document.addEventListener('keydown', e => {
    if (e.key === 'Escape') UI.closeModal();
});

/* =====================================================
   初始化
===================================================== */
UI.render();
</script>
</body>
</html>
